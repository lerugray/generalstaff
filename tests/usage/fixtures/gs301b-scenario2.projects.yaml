# gs-301b scenario 2 — max_usd hard-stop mid-session.
# Subprocess injects a synthetic reader: first window $1 (under cap), then $10 (over $5 cap).
# Shipped PROGRESS event for the stop is _fleet/session_budget_exceeded (not cycle_end).

projects:
  - id: ubudget-proj
    path: .
    priority: 1
    engineer_command: "echo engineer"
    verification_command: "echo verify"
    cycle_budget_minutes: 1
    work_detection: tasks_json
    concurrency_detection: none
    branch: bot/work
    auto_merge: false
    hands_off:
      - dummy-pattern

dispatcher:
  state_dir: ./state
  fleet_state_file: ./fleet_state.json
  stop_file: ./STOP
  override_file: ./next_project.txt
  picker: priority_x_staleness
  max_cycles_per_project_per_session: 100
  log_dir: ./logs
  digest_dir: ./digests
  max_parallel_slots: 1
  session_budget:
    max_usd: 5
    enforcement: hard
    provider_source: claude_code
