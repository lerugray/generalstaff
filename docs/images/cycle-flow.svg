<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="The cycle: dispatcher picks, engineer codes, verification gate tests must pass, reviewer scope match, audit log open. Loops back to dispatcher.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a2520"></path>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b5d4f"></path>
    </marker>
  </defs>

  
  <rect width="1200" height="300" fill="#fdfbf7"></rect>

  
  <text x="60" y="42" font-family="&#39;IBM Plex Mono&#39;,&#39;JetBrains Mono&#39;,&#39;Fira Code&#39;,Menlo,Consolas,monospace" font-size="15" letter-spacing="2.8" fill="#6b5d4f">FIGURE 1 · THE CYCLE</text>
  <line x1="60" y1="52" x2="260" y2="52" stroke="#6b5d4f" stroke-width="0.75"></line>

  
  <rect x="60" y="112" width="168" height="56" fill="none" stroke="#2a2520" stroke-width="1.2"></rect>
  <text x="144" y="146" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-size="18" letter-spacing="2.6" fill="#2a2520">DISPATCHER</text>
  <text x="144" y="196" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-style="italic" font-size="17" fill="#6b5d4f">picks</text>

  <line x1="232" y1="140" x2="284" y2="140" stroke="#2a2520" stroke-width="1.2" marker-end="url(#arr)"></line>

  
  <rect x="288" y="112" width="168" height="56" fill="none" stroke="#2a2520" stroke-width="1.2"></rect>
  <text x="372" y="146" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-size="18" letter-spacing="2.6" fill="#2a2520">ENGINEER</text>
  <text x="372" y="196" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-style="italic" font-size="17" fill="#6b5d4f">codes</text>

  <line x1="460" y1="140" x2="486" y2="140" stroke="#2a2520" stroke-width="1.2" marker-end="url(#arr)"></line>

  
  <rect x="490" y="108" width="220" height="64" fill="#f3e7db" stroke="#7a3b1e" stroke-width="1.6"></rect>
  <text x="600" y="138" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-size="17" letter-spacing="2.0" fill="#7a3b1e">VERIFICATION GATE</text>
  <text x="600" y="158" text-anchor="middle" font-family="&#39;IBM Plex Mono&#39;,&#39;JetBrains Mono&#39;,Menlo,Consolas,monospace" font-size="12" letter-spacing="1" fill="#7a3b1e">211 verified · 20 rejected</text>
  <text x="600" y="196" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-style="italic" font-size="17" fill="#6b5d4f">tests must pass</text>

  <line x1="714" y1="140" x2="740" y2="140" stroke="#2a2520" stroke-width="1.2" marker-end="url(#arr)"></line>

  
  <rect x="744" y="112" width="168" height="56" fill="none" stroke="#2a2520" stroke-width="1.2"></rect>
  <text x="828" y="146" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-size="18" letter-spacing="2.6" fill="#2a2520">REVIEWER</text>
  <text x="828" y="196" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-style="italic" font-size="17" fill="#6b5d4f">scope match</text>

  <line x1="916" y1="140" x2="968" y2="140" stroke="#2a2520" stroke-width="1.2" marker-end="url(#arr)"></line>

  
  <rect x="972" y="112" width="168" height="56" fill="none" stroke="#2a2520" stroke-width="1.2"></rect>
  <text x="1056" y="146" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-size="18" letter-spacing="2.6" fill="#2a2520">AUDIT LOG</text>
  <text x="1056" y="196" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-style="italic" font-size="17" fill="#6b5d4f">open</text>

  
  <path d="M 1056 220 C 1056 262, 900 262, 600 262 C 300 262, 144 262, 144 220" fill="none" stroke="#6b5d4f" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arr-muted)"></path>
  <text x="600" y="256" text-anchor="middle" font-family="&#39;Iowan Old Style&#39;,&#39;Palatino Linotype&#39;,Palatino,Georgia,serif" font-style="italic" font-size="15" fill="#6b5d4f">next cycle</text>
</svg>